<!-- index.html -->
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quien soy</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 1200px;
      padding: 24px;
      text-align: center;
    }

    #nombre {
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(42px, 8vw, 96px);
      font-weight: 700;
      line-height: 1.1;
      text-align: center;
      word-break: break-word;
    }

    .botones {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      background: #fff;
      color: #000;
      padding: 14px 22px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="nombre">Toca empezar</div>

    <div class="botones">
      <button id="btnEmpezar">Empezar</button>
      <button id="btnSiguiente" disabled>Siguiente</button>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
